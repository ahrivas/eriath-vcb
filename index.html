<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eriath::VCB</title>
  <meta name="description" content="Vibe code blog for a MUD engine serving a world-building project named Eriath.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="read-progress"></div>

<nav class="nav">
  <div class="nav-inner">
    <span class="nav-logo" onclick="showHome()">ERIATH</span>
    <div class="nav-tags" id="nav-tags"></div>
    <div class="nav-search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="m13.5 13.5 3.5 3.5"/>
      </svg>
      <input class="nav-search" type="search" id="search-input" placeholder="Search posts…" autocomplete="off">
    </div>
  </div>
</nav>

<div class="wrap">
  <section class="hero">
    <p class="hero-label">Vibe Code Blog</p>
    <p class="hero-sub">Documenting a world-building project and the vibe coded MUD codebase & utilities that serve it.</p>
  </section>
  
  <div class="posts-header">
    <span class="posts-header-label" id="section-label">All posts</span>
    <span class="posts-count" id="posts-count"></span>
  </div>
  <div class="posts-grid" id="posts-grid"></div>

  <footer class="footer">
    <div class="footer-logo"><a href="https://github.com/ahrivas/eriath-vcb">GitHub</a></div>
    <div class="footer-copy"></div>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-inner">
    <button class="overlay-close" id="overlay-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to all posts
    </button>
    <div id="article-content"></div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" aria-label="Scroll to top">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
    <path d="M8 12V4M4 8l4-4 4 4"/>
  </svg>
</button>

<script src="posts.js"></script>
</body>
</html>
